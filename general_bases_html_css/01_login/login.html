<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="login.css">    
    <title>Eimily-Login 🩰</title>
</head>
<body>
    <div class="general-container">
        <div class="login-container">
            <img class='login-container__logo' src="logo.png" alt='DanzasEimily'/>
            <h1 class='login-container__tittle'>Login</h1>
            <form action="" method="post" class="login-container-form">
                <label class="login-container-form__label" for="user">Usuario</label>
                <input type="text" placeholder="usuario" id="user" class="login-container-form__input">
                <label class="login-container-form__label" for="pass">Contraseña</label>
                <input type="password" placeholder="contraseña" id="pass" class="login-container-form__input">
                <button class='login-container-form__button login-container-form--button-pink'type='submit'>Ingresar</button>
            </form>
            <p class='login-container__text'>¿Olvidaste tu contraseña? <a href="">click aqui!!</a></p>
            <a class="login-container-form__button login-container-form--button-white" href="">Registrarme</a>
        </div>
    </div>
</body>
</html>
