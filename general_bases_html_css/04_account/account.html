<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="account.css">    
    <title>Eimily-account 🩰</title>
</head>
<body>
    <div class="general-container">
        <div class="account-container">
            <img class='account-container__logo' src="logo.png" alt='DanzasEimily'/>
            <h1 class='account-container__tittle'>Mi cuenta</h1>
            <form class="account-container-form" action="">
                <div>
                    <label class="account-container__label" for="user">Usuario</label>
                    <p class="account-container__value">Ricardo Carvajal</p>
                    <label class="account-container__label" for="pass">Contraseña</label>
                    <p class="account-container__value">********</p>
                    <label class="account-container__label" for="mail">email</label>
                    <p class="account-container__value">danzaseimily@correo.com</p>
                </div>
                <button class="account-container__button" type="submit">Editar</button>
            </form>
        </div>
    </div>
</body>
</html>
