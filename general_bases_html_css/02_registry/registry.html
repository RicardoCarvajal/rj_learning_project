<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="registry.css">    
    <title>Eimily-Sing Up 🩰</title>
</head>
<body>
    <div class="general-container">
        <div class="registry-container">
            <img class='registry-container__logo' src="logo.png" alt='DanzasEimily'/>
            <h1 class='registry-container__tittle'>Registro</h1>
            <form action="" method="post" class="registry-container-form">
                <label class="registry-container-form__label" for="user">Usuario</label>
                <input type="text" placeholder="usuario" id="user" class="registry-container-form__input">
                <label class="registry-container-form__label" for="pass">Contraseña</label>
                <input type="password" placeholder="contraseña" id="pass" class="registry-container-form__input">
                <label class="registry-container-form__label" for="confirm">Confirmación</label>
                <input type="password" placeholder="contraseña" id="confirm" class="registry-container-form__input">                
                <button class='registry-container-form__button'type='submit'>Ingresar</button>
            </form>
            <p class='registry-container__text'>¿Ya tienes una cuenta? <a href="">Login</a></p>
        </div>
    </div>
</body>
</html>
