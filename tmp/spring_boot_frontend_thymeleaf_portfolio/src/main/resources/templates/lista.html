<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
</head>
<body>
<h1 th:text="${titulo}"></h1>
<div th:if="${param.error != null}"  th:text="${param.error}"></div>
<div th:if="${param.success != null}"  th:text="${param.success}"></div>
<br>
<a th:href="@{/form}">CREATE +</a>
<br>
<br>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Id</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Porcentaje</th>
            <th>Desviación</th>
            <th>Area</th>
            <th>Fecha</th>
            <th>Obcervación</th>
            <th>EDITAR</th>
            <th>ELIMINAR</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="proyecto: ${proyectos}">
            <td th:text="${proyecto.id}"></td>
            <td th:text="${proyecto.name}"></td>
            <td th:text="${proyecto.description}"></td>
            <td style="text-align: center" th:text="${proyecto.percentage}+'%'"></td>
            <td style="text-align: center" th:text="${proyecto.deviationPercentage}+'%'"></td>
            <td th:text="${proyecto.area}"></td>
            <td th:text="${proyecto.requestDateFinalPlan}"></td>
            <td th:text="${proyecto.observations}"></td>
            <td><a th:href="@{/form-v2/}+${proyecto.id}">editar</a></td>
            <td><a th:href="@{/delete/}+${proyecto.id}">eliminar</a></td>
        </tr>
        </tbody>
    </table>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
</body>
</html>
