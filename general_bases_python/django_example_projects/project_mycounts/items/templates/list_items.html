<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Lista de items</title>
    </head>
    <body>
        <h1>Listado de categoria de ingresos y gastos</h1>
        <table>
          <tr>
            <td>ID</td>
            <td>NOMBRE</td>
            <td>DESCRIPCION</td>
          </tr>
          {% for  item in items_list %}
          <tr>
            <td>{{item.id}}</td>
            <td>{{item.name}}</td>
            <td>{{item.description}}</td>
          </tr>   
          {% endfor %}         
        </table>
    </body>
</html>
