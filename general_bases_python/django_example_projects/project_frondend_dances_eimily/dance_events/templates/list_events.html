{% extends "base.html" %}
{% block content %}
<h1>Listado de movimientos</h1>
{% for events in list_events %}
{% if events.image %}
<img src={{events.image.url}} alt={{events.name}} />
{% endif %}
<ul>
  <li>{{events.name}}</li>
  <li>{{events.date}}</li>
  <li>{{events.description}}</li>
  <li>{{events.location}}</li>
</ul>
{% endfor %}
{% endblock content %}
