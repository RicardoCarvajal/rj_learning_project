<!DOCTYPE html>
<html>
    <head>
        {% load static %}
        <meta charset="utf-8">
        <link rel="stylesheet" type="text/css" href="{% static 'general.css' %}">
        <title>Danzas Eimily 🩰</title>
    </head>
    <header>
        <nav>
            <div class='nav-div-left'>
                <div><img class='general-logo' src="{% static 'logo.png' %}" alt='DanzasEimily'/></div>
                <div><h1 class='general_h1'>Academia de Danzas Eimily</h1></div>
            </div>
            <div class='nav-div-right'>
                {% if user.is_authenticated %}
                <div class='nav-item-right'><h1>Hola, {{user.first_name}}</h1></div>
                <div>
                    <form action={% url "logout" %} method='post'>
                        {% csrf_token %}
                        <button type='submit'>Logout</button>
                    </form>
                </div>
                {% else %}
                <div><a class='nav-a' href={% url "login" %}>Login</a></div>
                {% endif %}   
            </div>
        </nav>
    </header>
    <body>

            <div class='general-container'>
                {% block content %}{% endblock  %}
            </div>

    </body>
</html>
