{% extends "base.html" %}
{% block content %}
{% load static %}
<div class='login-container '>
    <img class='login_logo' src="{% static 'logo.png' %}" alt='DanzasEimily'/>
    <h1 class='login_h1'>Login</h1>
    <form action='' method='post'>
    {% csrf_token %}
    {{form.as_p}}
    <button type='submit' class='login-button'>Ingresar</button>
    </form>
    <p>¿No tienes una cuenta? <a href="{% url "register" %}">Registrate</a></p>
</div>
{% endblock content %}
