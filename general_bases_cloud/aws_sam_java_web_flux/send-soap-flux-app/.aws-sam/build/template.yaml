AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'Stack principal de integraciones telegram stellar

  '
Parameters:
  environment:
    Type: String
    Default: dev
    Description: 'Ambientes de implementacion: dev, qa, prod.'
    AllowedValues:
    - dev
    - qa
    - prod
  country:
    Type: String
    Description: 'Paises de implementacion: gt, sv, ve.'
    Default: ve
    AllowedValues:
    - gt
    - sv
    - ve
Resources:
  telegramstack:
    Type: AWS::Serverless::Application
    Properties:
      Location: telegramstack/template.yaml
      Parameters:
        environment:
          Ref: environment
        country:
          Ref: country
        ParentStackName:
          Ref: AWS::StackName
        secrettelegramcredential:
          Ref: secrettelegramcredential
        secrettelegramusers:
          Ref: secrettelegramusers
    Metadata:
      SamResourceId: telegramstack
  secrettelegramcredential:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name:
        Fn::Sub: ate/${environment}/${country}/stellar/secret/telegramcredentials
      Description: Contiene las gredenciales de telegram para api bot
      SecretString: '{"TELEGRAM_TOKEN": "xxx"}'
  secrettelegramusers:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name:
        Fn::Sub: ate/${environment}/${country}/stellar/secret/telegramusers
      Description: Contiene los usuarios autorizados para telegram bot
      SecretString: '{"TELEGRAM_USERS": "xxx"}'
Outputs:
  telegramstack:
    Value:
      Fn::GetAtt:
      - telegramstack
      - Outputs.telegramApi
