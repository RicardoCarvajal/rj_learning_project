AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'Stack principal de integraciones telegram stellar

  '
Parameters:
  environment:
    Type: String
    Default: dev
    Description: 'Ambientes de implementacion: dev, qa, prod.'
    AllowedValues:
    - dev
    - qa
    - prod
  country:
    Type: String
    Description: 'Paises de implementacion: cr, gt, sv, ve.'
    Default: ve
    AllowedValues:
    - gt
    - sv
    - ve
Resources:
  clientoutputstack:
    Type: AWS::Serverless::Application
    Properties:
      Location: clientoutputstack/template.yaml
    Metadata:
      SamResourceId: clientoutputstack
