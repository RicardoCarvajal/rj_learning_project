AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'telegram-bot-app

  Sample SAM Template for telegram-bot-app

  '
Globals:
  Function:
    Timeout: 20
    MemorySize: 512
    LoggingConfig:
      LogFormat: JSON
Resources:
  TelegramFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: TelegramFunction
      Handler: com.rcarvajal.app.service.app.function.config.AWSFunctionConfig::execute
      Runtime: java21
      Architectures:
      - x86_64
      MemorySize: 512
      Environment:
        Variables:
          SPRING_CLOUD_FUNCTION_DEFINITION: botFunction
          JAVA_TOOL_OPTIONS: -XX:+TieredCompilation -XX:TieredStopAtLevel=1
    Metadata:
      SamResourceId: TelegramFunction
