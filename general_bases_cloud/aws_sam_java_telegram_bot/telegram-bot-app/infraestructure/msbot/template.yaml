AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  telegram-bot-app

  Sample SAM Template for telegram-bot-app

Globals:
  Function:
    MemorySize: 512  
    Timeout: 10
    Runtime: java21
    Architectures:
    - x86_64
    LoggingConfig:
      LogFormat: Text

Parameters:
  environment:
    Type: String
  country:
    Type: String
  ParentStackName:
    Type: String    
  secrettelegramcredential:
    Type: String
  secrettelegramusers:
    Type: String
  secretwebhooktoken:
    Type: String

Resources:
# --------- SQSs --------- #
  telegramQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 60
      QueueName: !Sub ${ParentStackName}-sqs-telegramqueue

# --------- lambda --------- #
  telegramFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ParentStackName}-lbda-telegramfunction
      Role: !GetAtt telegramLambdaRole.Arn
      CodeUri: ../../source/msbot/bot
      Handler: org.springframework.cloud.function.adapter.aws.FunctionInvoker::handleRequest
      Environment:
        Variables:
          ENV_APP: !Ref environment
          COUNTRY: !Ref country
          SECRET_TELEGRAM_CREDENTIAL: !Ref secrettelegramcredential
          SECRET_TELEGRAM_USERS: !Ref secrettelegramusers
      Events:
        telegramEventSQS:
          Type: SQS
          Properties:
            Queue: !GetAtt telegramQueue.Arn
            BatchSize: 1
            Enabled: true
    Metadata:
      BuildMethod: makefile

# --------- lambda --------- #
  telegramAuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ParentStackName}-lbda-telegramfunction-auth
      Role: !GetAtt telegramLambdaRole.Arn
      CodeUri: ../../source/msbot/auth
      Handler: org.springframework.cloud.function.adapter.aws.FunctionInvoker::handleRequest
      Environment:
        Variables:
          ENV_APP: !Ref environment
          COUNTRY: !Ref country
          SECRET_WEBHOOK_TOKEN: !Ref secretwebhooktoken
    Metadata:
      BuildMethod: makefile      

  # --------- API --------- #
  telegramAPIRest:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub ${ParentStackName}-apigateway-telegramapirest
      EndpointConfiguration: 
        Types: 
        - REGIONAL

  v1telegramAPIRest:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref telegramAPIRest
      ParentId: !GetAtt telegramAPIRest.RootResourceId
      PathPart: v1

  telegramResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref telegramAPIRest
      ParentId: !Ref v1telegramAPIRest
      PathPart: telegramsend
    Metadata:
      SamResourceId: telegramsend

  telegramMethodSQS:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref telegramAPIRest
      ResourceId: !Ref telegramResource
      HttpMethod: POST
      AuthorizerId: !Ref telegramAuthorizer
      AuthorizationType: CUSTOM
      Integration:
        IntegrationResponses:
          - StatusCode: 200
        IntegrationHttpMethod: POST
        RequestTemplates:
          application/json: "Action=SendMessage&MessageBody=$util.urlEncode($input.body)"
        RequestParameters:
          integration.request.header.Content-Type: "'application/x-www-form-urlencoded'" 
        Type: AWS
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:sqs:path//${queueName}
          - queueName: !GetAtt telegramQueue.QueueName
        Credentials: !GetAtt telegramApiRoleSqs.Arn
      MethodResponses:
        - StatusCode: 200

  telegramAuthorizer:
    Type: AWS::ApiGateway::Authorizer
    Properties:
      AuthorizerUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${telegramAuthFunction.Arn}/invocations
      IdentitySource: "method.request.header.x-telegram-bot-api-secret-token"
      AuthorizerResultTtlInSeconds: 1
      Name: x-telegram-bot-api-secret-token
      RestApiId: !Ref telegramAPIRest
      Type: TOKEN

  telegramAPIRestDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: telegramMethodSQS
    Properties:
      RestApiId: !Ref telegramAPIRest

  telegramAPIRestStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      DeploymentId: !Ref telegramAPIRestDeployment
      RestApiId: !Ref telegramAPIRest
      StageName: !Ref environment

  telegramApiRoleSqs:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - apigateway.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: !Sub ${ParentStackName}-telegramApiRoleSqs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: "sqs:SendMessage"
                Resource: !GetAtt telegramQueue.Arn


  telegramLambdaRole:
    Type: AWS::IAM::Role
    Properties: 
      RoleName: !Sub ${ParentStackName}-telegramlambdarole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
            - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaSQSQueueExecutionRole
      Policies:
        - PolicyName: !Sub ${ParentStackName}-telegramlambdapolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:             
                  - secretsmanager:GetSecretValue
                  - bedrock:InvokeModel               
                Resource:
                  - "*"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Sub  "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:ate/${environment}/*"

  telegramSqsInputPolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: "apigateway.amazonaws.com"
            Resource: !GetAtt telegramQueue.Arn
            Action:
              - "sqs:SendMessage"
              - "sqs:ReceiveMessage"
            Condition:
              ArnEquals:
                aws:SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${telegramAPIRest}/*"
      Queues:
        - !Ref telegramQueue       


  telegramFunctionAuthorizerPermition:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref telegramAuthFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${telegramAPIRest}/authorizers/${telegramAuthorizer}"

Outputs:
  telegramApi:
    Description: "API Gateway endpoint URL for Prod stage for telegram function"
    Value: !Sub "https://${telegramAPIRest}.execute-api.${AWS::Region}.amazonaws.com/${environment}/v1/telegramsend"